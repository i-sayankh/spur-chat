# Render blueprint for the backend (Node + Express + Prisma).
# Deploy from the repo root so npm workspaces resolve @spur-chat/shared.
services:
  - type: web
    name: spur-chat-server
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build:server && npm run prisma:deploy
    startCommand: npm run start --workspace @spur-chat/server
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # set to the Neon pooled URL (sslmode=require)
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CORS_ORIGIN
        sync: false # set to the Vercel frontend URL
      # PORT is provided by Render automatically.
